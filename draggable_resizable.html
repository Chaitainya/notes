<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            width: 100%;
            height: 100vh;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            ;
        }

        .main {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .window {
            width: 200px;
            height: 400px;
            background-color: aquamarine;
            cursor: default;
            position: fixed;
            border: 1px solid #dfdfdf;
        }

        .content {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .header {
            width: 100%;
            height: 50px;
            background-color: #dfdfdf;
            cursor: move;
        }

        /* Resize */
        /* Common for all handles */
        .handle {
            position: absolute;
            background: transparent;
        }

        /* Sides */
        .handle.top {
            top: -3px;
            left: 0;
            width: 100%;
            height: 6px;
            cursor: n-resize;
        }

        .handle.bottom {
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 6px;
            cursor: s-resize;
        }

        .handle.left {
            left: -3px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: w-resize;
        }

        .handle.right {
            right: -3px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: e-resize;
        }

        /* Corners */
        .handle.top-left {
            top: -5px;
            left: -5px;
            width: 10px;
            height: 10px;
            cursor: nw-resize;
        }

        .handle.top-right {
            top: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            cursor: ne-resize;
        }

        .handle.bottom-left {
            bottom: -5px;
            left: -5px;
            width: 10px;
            height: 10px;
            cursor: sw-resize;
        }

        .handle.bottom-right {
            bottom: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            cursor: se-resize;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="window">
            <div class="header"></div>

            <div class="handle top"></div>
            <div class="handle right"></div>
            <div class="handle bottom"></div>
            <div class="handle left"></div>

            <div class="handle top-left"></div>
            <div class="handle top-right"></div>
            <div class="handle bottom-left"></div>
            <div class="handle bottom-right"></div>
        </div>
    </div>

    <script>
        let isDragging = false;
        let isResizing = false;
        let currentHandle = null;

        (function () {
            dragger();
            resizer();

            window.addEventListener("mouseup", () => {
                isDragging = false;
                isResizing = false;
                currentHandle = null;
            });
        })();

        function resizer() {
            const box = document.querySelector(".window");
            const handle = document.querySelectorAll(".handle");
            isResizing = false;
            currentHandle = null;

            let startX, startY, startWidth, startHeight, startLeft, startTop;

            handle.forEach(handle => {
                handle.addEventListener("mousedown", (e) => {
                    e.preventDefault();

                    isResizing = true;
                    currentHandle = handle.classList[1];

                    const rect = box.getBoundingClientRect();

                    startX = e.clientX;
                    startY = e.clientY;
                    startWidth = rect.width;
                    startHeight = rect.height;
                    startLeft = rect.left;
                    startTop = rect.top;
                });
            });

            window.addEventListener("mousemove", (e) => {
                if (!isResizing) return;

                let dx = e.clientX - startX;
                let dy = e.clientY - startY;

                switch (currentHandle) {
                    case "right":
                        box.style.width = startWidth + dx + "px";
                        break;
                    case "left":
                        box.style.width = startWidth - dx + "px";
                        box.style.left = startLeft + dx + "px";
                        break;
                    case "bottom":
                        box.style.height = startHeight + dy + "px";
                        break;
                    case "top":
                        box.style.height = startHeight - dy + "px";
                        box.style.top = startTop + dy + "px";
                        break;

                    /* Corners */
                    case "top-left":
                        box.style.width = startWidth - dx + "px";
                        box.style.left = startLeft + dx + "px";
                        box.style.height = startHeight - dy + "px";
                        box.style.top = startTop + dy + "px";
                        break;

                    case "top-right":
                        box.style.width = startWidth + dx + "px";
                        box.style.height = startHeight - dy + "px";
                        box.style.top = startTop + dy + "px";
                        break;

                    case "bottom-left":
                        box.style.width = startWidth - dx + "px";
                        box.style.left = startLeft + dx + "px";
                        box.style.height = startHeight + dy + "px";
                        break;

                    case "bottom-right":
                        box.style.width = startWidth + dx + "px";
                        box.style.height = startHeight + dy + "px";
                        break;
                }
            });
        }

        function dragger() {
            const main = document.querySelector('.main');
            const header = document.querySelector('.header');
            const window = document.querySelector('.window');

            isDragging = false;
            let offsetX = 0;
            let offsetY = 0;

            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - window.offsetLeft;
                offsetY = e.clientY - window.offsetTop;
            });

            main.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                // e.clientX move x-axis movement
                // e.clientY move y-axis movement

                // left and right
                const newLeft = e.clientX - offsetX;

                // Top and bottom
                const newTop = e.clientY - offsetY;

                // Restrict Left Overflow
                if (newLeft <= 0) {
                    window.style.left = "0px";
                    return;
                }

                // Restrict Top Overflow
                if (newTop <= 0) {
                    window.style.top = "0px";
                    return;
                }

                // Restrict Right Overflow
                const containerWidth = main.offsetWidth;
                const elementWidth = window.offsetWidth;
                const maxRight = containerWidth - elementWidth;
                if (newLeft >= maxRight) {
                    window.style.left = maxRight + "px";
                    return;
                }

                // Restrict Bottom Overflow
                const containerHeight = main.offsetHeight;
                const elementHeight = window.offsetHeight;
                const maxBottom = containerHeight - elementHeight;
                if (newTop >= maxBottom) {
                    window.style.top = maxBottom + "px";
                    return;
                }

                window.style.left = newLeft + "px";
                window.style.top = newTop + "px";
            });
        }
    </script>
</body>

</html>
